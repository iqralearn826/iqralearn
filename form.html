<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration - Iqra Learn</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<section class="section">
<div class="content">

<h2>Student Registration Form</h2>

<form action="https://formsubmit.co/iqralearn826@gmail.com" method="POST">

<!-- STUDENT INFO -->
<h3>Student Information</h3>

<input type="text" name="Full Name" placeholder="Full Name" required>

<input type="number" name="Age" placeholder="Age" required>

<select name="Gender" required>
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<!-- COURSE -->
<h3>Select Course</h3>

<select name="Course" required>
<option value="">Choose Course</option>
<option>Basic Qaida Course (Beginners)</option>
<option>Quran Recitation</option>
<option>Islamic Studies</option>
<option>Quran Memorisation</option>
<option>Quran Translation</option>
</select>

<!-- SCHEDULE -->
<h3>Class Details</h3>

<input type="text" name="Days" placeholder="Preferred Days (e.g. Mon, Wed)" required>

<input type="text" name="Time" placeholder="Preferred Time" required>

<input type="text" name="Duration" placeholder="Class Duration (e.g. 30 mins)" required>

<!-- PARENT DETAILS -->
<h3>Parent / Guardian Details</h3>

<input type="text" name="Parent Name" placeholder="Parent Name" required>

<input type="text" name="Relationship" placeholder="Relationship with Child" required>

<input type="tel" name="Phone" placeholder="Phone Number" required>

<input type="email" name="Email" placeholder="Email Address" required>

<!-- CONSENT -->
<div style="margin-top:15px; text-align:left;">
<label style="font-size:14px;">
<input type="checkbox" required>
 I consent to being contacted via WhatsApp or Email to confirm classes.
</label>
</div>

<!-- HIDDEN SETTINGS -->
<input type="hidden" name="_subject" value="New Student Registration - Iqra Learn">
<input type="hidden" name="_captcha" value="false">

<button type="submit">Submit Registration</button>

</form>

</div>
</section>

</body>
</html>
